<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Hello World from Spring Boot!</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1 th:text="|Hola, ${person.firstName} ${person.LastName}|" >texto por defecto</h1>
        <h1 th:if="${person.firstName.length < 3}">Error, el nombre tiene menos de 3 letras</h1>
    </body>
</html>
